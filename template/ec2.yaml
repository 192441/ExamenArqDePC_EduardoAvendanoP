AWSTemplateFormatVersion: '2010-09-09'
Description: EC2 Examen Arquitectura de Computadores

Resources:

  SecurityGroupEC2:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Enable HTTP access
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: ami-0c02fb55956c7d316   # Amazon Linux 2 (us-east-1)
      InstanceType: t2.micro
      SecurityGroups:
        - !Ref SecurityGroupEC2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          yum update -y
          yum install -y httpd
          systemctl start httpd
          systemctl enable httpd

          cat <<EOF > /var/www/html/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <title>Examen Final</title>
            <style>
              body { font-family: Arial; text-align: center; background-color: #f0f0f0; }
              h1 { color: #2c3e50; }
              p { font-size: 18px; }
            </style>
          </head>
          <body>
            <h1>Examen Final Arquitectura de Computadores</h1>
            <p><b>Nombre:</b> Eduardo Avendaño Pérez</p>
            <p><b>Código:</b> 0192441</p>
            <script>
              console.log("Página desplegada correctamente");
            </script>
          </body>
          </html>
          EOF