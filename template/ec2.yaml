UserData:
  Fn::Base64: |
    #!/bin/bash
    yum update -y
    yum install -y httpd
    systemctl enable httpd
    systemctl start httpd

    cat <<EOF > /var/www/html/index.html
    <!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Examen Final</title>
        <style>
            body {
                font-family: Arial;
                background: #0f172a;
                color: white;
                text-align: center;
                padding-top: 50px;
            }
            .card {
                background: #1e293b;
                padding: 20px;
                border-radius: 15px;
                display: inline-block;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h1>Examen Final Arquitectura de Computadores</h1>
            <h2>Nombre: Eduardo Avendaño Perez</h2>
            <h3>Código: 0192441</h3>

            <button onclick="mostrar()">Click aquí</button>
            <p id="msg"></p>
        </div>

        <script>
            function mostrar() {
                document.getElementById("msg").innerText =
                "Despliegue en AWS funcionando correctamente 🚀";
            }
        </script>
    </body>
    </html>
    EOF